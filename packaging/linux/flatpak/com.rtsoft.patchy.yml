# Flatpak manifest for the self-hosted Patchy bundle (see packaging/linux/README.md).
# The org.kde.Platform 6.8 runtime ships the same Qt 6.8 line the app is developed
# against -- Qt is deliberately NOT vendored here.
app-id: com.rtsoft.patchy
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
command: patchy
finish-args:
  # Wayland first, X11 fallback (also lets users force QT_QPA_PLATFORM=xcb).
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  # Update check (GitHub manifest fetch).
  - --share=network
  # Pragmatic v1 (the GIMP/Krita position): recents, CLI file arguments, and palette/
  # brush folders behave like a desktop editor. File dialogs still go through the
  # portal. A portal-only tightening is possible later at the cost of the recents menu
  # not reopening unexported paths.
  - --filesystem=home
# HEIC/HEIF decode: the KDE 6.8 runtime ships kimageformats' HEIF plugin, and the
# freedesktop 24.08 base ships libheif with its codec-plugin search dir compiled to
# /app/lib/ffmpeg/libheif -- but the HEVC decoder itself (libheif-libde265.so) lives in
# the ffmpeg-full extension for patent reasons. Declaring the extension point makes
# flatpak auto-install it with the app; Patchy bundles no HEVC code (deliberate, see
# docs/legal-constraints.md). If the runtime ever moves to org.kde.Platform 6.10+
# (freedesktop 25.08 base), DROP this block: codecs-extra is inherited automatically
# there and 25.08's libheif no longer searches /app/lib/ffmpeg.
add-extensions:
  org.freedesktop.Platform.ffmpeg-full:
    directory: lib/ffmpeg
    version: '24.08'
    add-ld-path: '.'
    autodelete: false
cleanup:
  - /include
  - /lib/cmake
cleanup-commands:
  # The ffmpeg-full extension's mount point must exist in the app tree.
  - mkdir -p /app/lib/ffmpeg
modules:
  - name: patchy
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DPATCHY_BUILD_TESTS=OFF
    sources:
      - type: dir
        path: ../../..
        skip:
          - build
          - .deps
          - .git
          - local-test-fixtures
