<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Testy Photopea host</title>
<style>
  body { margin:0; background:#14161a; color:#d8dade; font:13px "Segoe UI", sans-serif; }
  #log { padding:8px 12px; white-space:pre-wrap; max-height:160px; overflow:auto; }
  iframe { width:100vw; height:calc(100vh - 176px); border:0; }
</style>
</head>
<body>
<div id="log">starting...</div>
<iframe id="pea"></iframe>
<script>
"use strict";
// Drives an embedded photopea.com through its official postMessage API:
// scripts are posted as strings; Photopea answers with ArrayBuffers (saveToOE),
// echo strings (app.echoToOE), and a final "done" per script. Export bytes are
// POSTed back to the Testy server, and the driver (selenium) polls
// window.__testyResult for the outcome.
const params = new URLSearchParams(location.search);
const fileUrl = params.get("file");
const uploadBase = params.get("upload");        // e.g. http://127.0.0.1:8901/testy-upload?name=
const renderName = params.get("render");        // runs/<run>/.../render.png
const resaveName = params.get("resave") || ""; // optional psd upload target
const mutatedName = params.get("mutated") || "";
const suffix = params.get("suffix") || "";

const logDiv = document.getElementById("log");
const notes = [];
function log(message) {
  notes.push(String(message));
  logDiv.textContent = notes.slice(-14).join("\n");
}

let buffers = [];
let echoes = [];
let resolver = null;
window.addEventListener("message", event => {
  const data = event.data;
  if (data === "done") {
    if (resolver) {
      const resolve = resolver;
      resolver = null;
      resolve({ buffers: buffers.splice(0), echoes: echoes.splice(0) });
    }
    return;
  }
  if (data instanceof ArrayBuffer) {
    buffers.push(data);
  } else if (typeof data === "string") {
    echoes.push(data);
  }
});

function runScript(script, timeoutMs) {
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => {
      resolver = null;
      reject(new Error("script timed out"));
    }, timeoutMs || 45000);
    resolver = result => { clearTimeout(timer); resolve(result); };
    document.getElementById("pea").contentWindow.postMessage(script, "*");
  });
}

function waitReady(timeoutMs) {
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => {
      resolver = null;
      reject(new Error("Photopea never became ready (offline? file failed to load?)"));
    }, timeoutMs);
    resolver = result => { clearTimeout(timer); resolve(result); };
  });
}

async function upload(name, buffer) {
  const response = await fetch(uploadBase + encodeURIComponent(name), {
    method: "POST",
    body: buffer,
  });
  if (!response.ok) throw new Error("upload failed for " + name + ": " + response.status);
}

function finish(result) {
  result.notes = notes.slice(-30);
  window.__testyResult = JSON.stringify(result);
  document.title = "TESTY-" + (result.ok ? "DONE" : "FAIL");
  log(result.ok ? "ALL DONE" : "FAILED: " + result.error);
}

async function main() {
  if (!fileUrl || !uploadBase || !renderName) {
    throw new Error("missing required parameters");
  }
  // Photopea's https iframe cannot fetch our plain-http local URLs itself (the
  // config's files entry silently hangs at "Loading"), so the host fetches the
  // bytes same-origin and posts them as an ArrayBuffer - the API opens a posted
  // buffer as a document.
  document.getElementById("pea").src =
    "https://www.photopea.com#" + encodeURIComponent(JSON.stringify({ environment: {} }));
  log("waiting for the Photopea editor");
  await waitReady(60000);
  log("editor ready; fetching " + fileUrl);
  const fileResponse = await fetch(fileUrl);
  if (!fileResponse.ok) throw new Error("file fetch failed: " + fileResponse.status);
  const fileBuffer = await fileResponse.arrayBuffer();
  log("posting " + fileBuffer.byteLength + " bytes into Photopea");
  await new Promise((resolve, reject) => {
    const timer = setTimeout(() => { resolver = null; reject(new Error("file open timed out")); }, 90000);
    resolver = result => { clearTimeout(timer); resolve(result); };
    document.getElementById("pea").contentWindow.postMessage(fileBuffer, "*");
  });
  // Belt and braces: confirm a document actually exists before scripting it.
  let documentReady = false;
  for (let attempt = 0; attempt < 10 && !documentReady; attempt++) {
    const probe = await runScript('app.echoToOE("docs:" + app.documents.length);', 15000);
    const echo = probe.echoes.find(e => e.indexOf("docs:") === 0);
    if (echo && parseInt(echo.slice(5), 10) > 0) { documentReady = true; break; }
    await new Promise(resolve => setTimeout(resolve, 1500));
    log("document not open yet (attempt " + (attempt + 1) + ")");
  }
  if (!documentReady) throw new Error("document never finished loading in Photopea");
  log("document ready; exporting PNG");

  let result = await runScript('app.activeDocument.saveToOE("png");');
  if (result.buffers.length !== 1) throw new Error("PNG export returned " + result.buffers.length + " buffers");
  await upload(renderName, result.buffers[0]);
  log("render uploaded");

  if (resaveName) {
    log("exporting PSD");
    result = await runScript('app.activeDocument.saveToOE("psd");', 90000);
    if (result.buffers.length !== 1) throw new Error("PSD export returned " + result.buffers.length + " buffers");
    await upload(resaveName, result.buffers[0]);
    log("resave uploaded");
  }

  // The forced-text-re-render pass is strictly best-effort for Photopea: contents
  // assignment can hang its engine on some documents (the script's "done" never
  // arrives), and the exports above are already secured - never fail the cell here.
  let mutatedCount = -1;
  if (mutatedName && suffix) {
    try {
      log("appending text suffix (best effort)");
      const script =
        "var n=0;" +
        "function walk(ls){for(var i=0;i<ls.length;i++){var L=ls[i];" +
        "if(L.typename==\"LayerSet\"){walk(L.layers);continue;}" +
        "var t=null;try{t=L.textItem;}catch(e){}" +
        "if(!t)continue;" +
        "try{t.contents=t.contents+" + JSON.stringify(suffix) + ";n++;}catch(e){}}}" +
        "walk(app.activeDocument.layers);app.echoToOE(\"mutated:\"+n);";
      result = await runScript(script, 60000);
      const echo = result.echoes.find(e => e.indexOf("mutated:") === 0);
      mutatedCount = echo ? parseInt(echo.slice(8), 10) : -1;
      if (mutatedCount > 0) {
        log("mutated " + mutatedCount + " text layer(s); exporting mutated PNG");
        result = await runScript('app.activeDocument.saveToOE("png");');
        if (result.buffers.length === 1) {
          await upload(mutatedName, result.buffers[0]);
          log("mutated render uploaded");
        }
      } else {
        // No mutated export: an unmutated render would masquerade as a (bad)
        // forced-text-re-render score.
        log("no text layers mutated; skipping mutated render");
      }
    } catch (error) {
      log("text mutation skipped: " + error);
    }
  }
  finish({ ok: true, mutated: mutatedCount });
}

main().catch(error => finish({ ok: false, error: String(error) }));
</script>
</body>
</html>
